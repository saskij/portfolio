<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expanding Capsule Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        /* ────────────────────────────────────────────────
           Reset & Base
        ──────────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --color-bg: #0a0a0f;
            --color-surface: rgba(15, 15, 20, 0.60);
            --color-border: rgba(255, 255, 255, 0.08);
            --color-text: rgba(255, 255, 255, 0.82);
            --color-text-muted: rgba(255, 255, 255, 0.45);
            --color-accent: rgba(255, 255, 255, 0.15);
            --capsule-radius: 999px;
            --capsule-padding-y: 12px;
            --capsule-padding-x: 28px;
            --blur: 20px;
            --easing-premium: cubic-bezier(0.77, 0, 0.175, 1);
            --duration-capsule: 0.52s;
            --duration-items: 0.4s;
            --stagger: 0.08s;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            -webkit-font-smoothing: antialiased;
        }

        /* ────────────────────────────────────────────────
           Page Hero (just for context / demo backdrop)
        ──────────────────────────────────────────────── */
        .page-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 16px;
            text-align: center;
            padding: 120px 24px 24px;
            background:
                radial-gradient(ellipse 80% 60% at 50% -10%,
                    rgba(109, 40, 217, 0.18) 0%,
                    transparent 70%),
                radial-gradient(ellipse 50% 40% at 20% 80%,
                    rgba(30, 58, 138, 0.12) 0%,
                    transparent 70%);
        }

        .page-hero h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 600;
            letter-spacing: -0.03em;
            line-height: 1.1;
            background: linear-gradient(180deg, #fff 30%, rgba(255, 255, 255, 0.55) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-hero p {
            color: var(--color-text-muted);
            font-size: 1rem;
            max-width: 440px;
            line-height: 1.65;
        }

        /* ────────────────────────────────────────────────
           Site Header
        ──────────────────────────────────────────────── */
        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            /* No background — sits over the page */
        }

        /* Logo */
        .site-logo {
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            user-select: none;
        }

        /* ────────────────────────────────────────────────
           Menu Assembly: capsule + trigger wrapper
        ──────────────────────────────────────────────── */
        .menu-assembly {
            display: flex;
            align-items: center;
            gap: 0;
            /* Row direction: capsule LEFT, trigger button RIGHT */
            flex-direction: row;
        }

        /* ────────────────────────────────────────────────
           Capsule Container
        ──────────────────────────────────────────────── */
        .nav-capsule {
            overflow: hidden;
            white-space: nowrap;
            /* Width animates 0 → content-width */
            max-width: 0;
            opacity: 0;
            border-radius: var(--capsule-radius);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            box-shadow:
                0 4px 24px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            transition:
                max-width var(--duration-capsule) var(--easing-premium),
                opacity 0.2s ease;
            /* Capsule sits to the LEFT of the trigger */
            margin-right: 12px;
        }

        .nav-capsule.is-open {
            max-width: 600px;
            /* large enough to never clip realistic nav items */
            opacity: 1;
        }

        /* ────────────────────────────────────────────────
           Nav List inside capsule
        ──────────────────────────────────────────────── */
        .nav-list {
            display: flex;
            align-items: center;
            gap: 48px;
            list-style: none;
            padding: var(--capsule-padding-y) var(--capsule-padding-x);
        }

        /* ────────────────────────────────────────────────
           Nav Items — stagger fade-in from right
        ──────────────────────────────────────────────── */
        .nav-item {
            opacity: 0;
            transform: translateX(20px);
            transition:
                opacity var(--duration-items) ease,
                transform var(--duration-items) ease;
        }

        /* Set delay for each item (via CSS custom property set in HTML) */
        .nav-item[data-index="0"] {
            transition-delay: 0s;
        }

        .nav-item[data-index="1"] {
            transition-delay: var(--stagger);
        }

        .nav-item[data-index="2"] {
            transition-delay: calc(var(--stagger) * 2);
        }

        .nav-item[data-index="3"] {
            transition-delay: calc(var(--stagger) * 3);
        }

        .nav-item[data-index="4"] {
            transition-delay: calc(var(--stagger) * 4);
        }

        /* Visible state */
        .nav-capsule.is-open .nav-item {
            opacity: 1;
            transform: translateX(0);
        }

        /* Closing: reverse stagger (last item fades first) */
        .nav-capsule.is-closing .nav-item {
            opacity: 0;
            transform: translateX(20px);
        }

        .nav-capsule.is-closing .nav-item[data-index="0"] {
            transition-delay: calc(var(--stagger) * 4);
        }

        .nav-capsule.is-closing .nav-item[data-index="1"] {
            transition-delay: calc(var(--stagger) * 3);
        }

        .nav-capsule.is-closing .nav-item[data-index="2"] {
            transition-delay: calc(var(--stagger) * 2);
        }

        .nav-capsule.is-closing .nav-item[data-index="3"] {
            transition-delay: var(--stagger);
        }

        .nav-capsule.is-closing .nav-item[data-index="4"] {
            transition-delay: 0s;
        }

        /* ────────────────────────────────────────────────
           Nav Links
        ──────────────────────────────────────────────── */
        .nav-link {
            position: relative;
            display: inline-block;
            font-size: 0.8125rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: var(--color-text-muted);
            text-decoration: none;
            padding: 4px 0;
            transition: color 0.25s ease;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.7);
            transform: scaleX(0);
            transform-origin: left center;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-link:hover {
            color: rgba(255, 255, 255, 0.92);
        }

        .nav-link:hover::after {
            transform: scaleX(1);
        }

        /* ────────────────────────────────────────────────
           Hamburger / Close Trigger Button
        ──────────────────────────────────────────────── */
        .menu-trigger {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border: 1px solid var(--color-border);
            border-radius: 50%;
            background: var(--color-surface);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            cursor: pointer;
            flex-shrink: 0;
            transition:
                border-color 0.25s ease,
                background 0.25s ease,
                box-shadow 0.25s ease;
            /* Reset default button styles */
            appearance: none;
            -webkit-appearance: none;
        }

        .menu-trigger:hover {
            border-color: rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06);
        }

        .menu-trigger:focus-visible {
            outline: 2px solid rgba(139, 92, 246, 0.7);
            outline-offset: 3px;
        }

        /* ────────────────────────────────────────────────
           Hamburger Icon (3 bars → X)
        ──────────────────────────────────────────────── */
        .hamburger-icon {
            width: 18px;
            height: 12px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hamburger-icon span {
            display: block;
            height: 1.5px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            border-radius: 2px;
            transition:
                transform 0.38s cubic-bezier(0.23, 1, 0.32, 1),
                opacity 0.22s ease,
                top 0.38s cubic-bezier(0.23, 1, 0.32, 1);
            transform-origin: center;
        }

        /* Open state → X */
        .menu-trigger[aria-expanded="true"] .hamburger-icon span:nth-child(1) {
            transform: translateY(5px) rotate(45deg);
        }

        .menu-trigger[aria-expanded="true"] .hamburger-icon span:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }

        .menu-trigger[aria-expanded="true"] .hamburger-icon span:nth-child(3) {
            transform: translateY(-5.5px) rotate(-45deg);
        }
    </style>
</head>

<body>

    <!-- ═══════════════════════════════════════
         SITE HEADER
    ════════════════════════════════════════ -->
    <header class="site-header" role="banner">

        <!-- Logo -->
        <a href="#" class="site-logo" aria-label="Home">AS</a>

        <!-- Menu Assembly: Capsule + Trigger -->
        <div class="menu-assembly">

            <!-- Expanding Capsule Nav -->
            <nav class="nav-capsule" id="main-nav" aria-label="Main navigation" aria-hidden="true">
                <ul class="nav-list" role="list">
                    <li class="nav-item" data-index="0" role="none">
                        <a href="#work" class="nav-link">Work</a>
                    </li>
                    <li class="nav-item" data-index="1" role="none">
                        <a href="#about" class="nav-link">About</a>
                    </li>
                    <li class="nav-item" data-index="2" role="none">
                        <a href="#process" class="nav-link">Process</a>
                    </li>
                    <li class="nav-item" data-index="3" role="none">
                        <a href="#contact" class="nav-link">Contact</a>
                    </li>
                </ul>
            </nav>

            <!-- Hamburger / Close Button -->
            <button class="menu-trigger" id="menu-trigger" type="button" aria-controls="main-nav" aria-expanded="false"
                aria-label="Open navigation">
                <span class="hamburger-icon" aria-hidden="true">
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
            </button>

        </div>
    </header>

    <!-- ═══════════════════════════════════════
         PAGE CONTENT (demo backdrop)
    ════════════════════════════════════════ -->
    <main>
        <section class="page-hero">
            <h1>Expanding Capsule<br>Navigation</h1>
            <p>Click the icon in the top-right corner to open the animated capsule menu. Press <kbd>Esc</kbd> to close.
            </p>
        </section>
    </main>

    <!-- ═══════════════════════════════════════
         SCRIPT — NO LIBRARIES
    ════════════════════════════════════════ -->
    <script>
        (function () {
            'use strict';

            const trigger = document.getElementById('menu-trigger');
            const capsule = document.getElementById('main-nav');
            const navItems = capsule.querySelectorAll('.nav-item');

            // Duration that items need to fade out before capsule collapses
            // = stagger * (numItems - 1) + item-transition-duration (ms)
            const ITEM_EXIT_DURATION = (navItems.length - 1) * 80 + 400;

            let isOpen = false;
            let closingTimer = null;

            /* ── Open ── */
            function openMenu() {
                if (isOpen) return;
                isOpen = true;

                clearTimeout(closingTimer);
                capsule.classList.remove('is-closing');

                trigger.setAttribute('aria-expanded', 'true');
                trigger.setAttribute('aria-label', 'Close navigation');
                capsule.setAttribute('aria-hidden', 'false');

                // Make capsule expand first, then items stagger in
                capsule.classList.add('is-open');
            }

            /* ── Close ── */
            function closeMenu() {
                if (!isOpen) return;
                isOpen = false;

                trigger.setAttribute('aria-expanded', 'false');
                trigger.setAttribute('aria-label', 'Open navigation');

                // 1. Stagger items out
                capsule.classList.add('is-closing');
                capsule.classList.remove('is-open');

                // 2. After items finish, collapse capsule
                closingTimer = setTimeout(function () {
                    capsule.classList.remove('is-closing');
                    capsule.setAttribute('aria-hidden', 'true');
                }, ITEM_EXIT_DURATION);
            }

            /* ── Toggle ── */
            function toggleMenu() {
                if (isOpen) {
                    closeMenu();
                } else {
                    openMenu();
                }
            }

            /* ── Event Listeners ── */
            trigger.addEventListener('click', toggleMenu);

            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && isOpen) {
                    closeMenu();
                    trigger.focus();
                }
            });

            // Close on nav link click (smooth scroll handled by browser href)
            capsule.addEventListener('click', function (e) {
                if (e.target.classList.contains('nav-link')) {
                    closeMenu();
                }
            });

            // Close on outside click
            document.addEventListener('click', function (e) {
                if (isOpen && !trigger.contains(e.target) && !capsule.contains(e.target)) {
                    closeMenu();
                }
            });
        })();
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Tracer</title>
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #333;
        }

        .container {
            position: relative;
            width: 600px;
            height: 600px;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0.5;
        }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        path {
            fill: none;
            stroke: cyan;
            stroke-width: 2;
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="/Users/asha/.gemini/antigravity/brain/062c9dc0-4595-432c-9768-118b4c2580d1/media__1772348766827.png"
            alt="Reference Logo">
        <svg viewBox="0 0 100 100">
            <!-- Grid Lines test -->
            <path d="M 50 10 L 50 90" stroke="red" stroke-width="0.5" />
            <!-- Triangle Left Leg -->
            <path d="M 50 20 L 25 70" stroke="magenta" stroke-width="0.5" />
            <!-- Triangle Right Leg -->
            <path d="M 50 20 L 75 70" stroke="magenta" stroke-width="0.5" />
        </svg>
    </div>
</body>

</html>

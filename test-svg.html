<!DOCTYPE html>
<html>
<head>
    <title>SVG Test</title>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        svg { width: 400px; height: 400px; border: 1px solid #333; }
        .grid { stroke: rgba(255,255,255,0.1); stroke-width: 1; }
        .logo { fill: white; stroke: white; stroke-width: 2; }
    </style>
</head>
<body>
    <svg viewBox="0 0 100 100">
        <!-- Grid -->
        <g class="grid">
            <line x1="10" y1="0" x2="10" y2="100" />
            <line x1="30" y1="0" x2="30" y2="100" />
            <line x1="50" y1="0" x2="50" y2="100" />
            <line x1="70" y1="0" x2="70" y2="100" />
            <line x1="90" y1="0" x2="90" y2="100" />

            <line x1="0" y1="20" x2="100" y2="20" />
            <line x1="0" y1="40" x2="100" y2="40" />
            <line x1="0" y1="60" x2="100" y2="60" />
            <line x1="0" y1="80" x2="100" y2="80" />
        </g>
        
        <!-- Monogram A/S Outline -->
        <g class="logo" fill="none">
            <!-- Top piece (Apex + right side down + top crossbar?) -->
            <path d="M 50 10 L 30 50 L 50 50 L 60 30 Z" />
            <!-- Middle piece -->
            <path d="M 30 50 L 70 50 L 60 70 L 20 70 Z" />
            <!-- Bottom piece -->
            <path d="M 20 70 L 60 70 L 50 90 L 10 90 Z" />
        </g>
        
    </svg>
</body>
</html>
